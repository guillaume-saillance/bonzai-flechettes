<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Bonzaï Fléchettes">
  <rect width="512" height="512" fill="#fdf0d5" />
  <g transform="translate(86 86) scale(3.4)">
    <g stroke="#003049" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">

      <!-- Cornes (droite définie, gauche miroir) -->
      <path id="corne" fill="#fdf0d5" d="M52,38
        C56,27 67,16 84,9 C88,7 94,5 96,7
        C90,14 80,21 70,31 C64,36 58,40 54,42 Z" />
      <use href="#corne" transform="matrix(-1 0 0 1 100 0)" />

      <!-- Tête -->
      <path fill="#c1121f" d="M50,29
        C62,27 68,30 70,40 C72,51 70,61 64,69
        C60,75 56,79 50,81 C44,79 40,75 36,69
        C30,61 28,51 30,40 C32,30 38,27 50,29 Z" />

      <!-- Touffe sur le front -->
      <path fill="#003049" stroke="none" d="M43,31
        C45,22 48,25 50,19 C52,25 55,22 57,31
        C53,29 47,29 43,31 Z" />

      <!-- Museau -->
      <path fill="#fdf0d5" d="M50,59
        C59,59 64,65 62,72 C61,78 56,81 50,82
        C44,81 39,78 38,72 C36,65 41,59 50,59 Z" />

      <!-- Yeux (droite + miroir) -->
      <g id="oeil" stroke="none">
        <path fill="#003049" d="M55,49 L67,45 L69,51 L57,54 Z" />
        <circle cx="63.5" cy="49.5" r="1.4" fill="#fdf0d5" />
      </g>
      <use href="#oeil" transform="matrix(-1 0 0 1 100 0)" />

      <!-- Naseaux (droite + miroir) -->
      <ellipse id="naseau" cx="56" cy="70" rx="2.7" ry="1.9"
        fill="#003049" stroke="none" transform="rotate(18 56 70)" />
      <use href="#naseau" transform="matrix(-1 0 0 1 100 0)" />

      <!-- Fléchette en travers de la gueule -->
      <g stroke-width="1.6">
        <polygon fill="#fdf0d5" points="12,80 24,77 24,83" />
        <rect x="24" y="77.2" width="32" height="5.6" rx="2.6" fill="#003049" />
        <rect x="55" y="79" width="9" height="2" rx="1" fill="#669bbc" stroke="none" />
        <polygon fill="#c1121f" points="63,80 88,72 83,80" />
        <polygon fill="#669bbc" points="63,80 88,88 83,80" />
      </g>
    </g>
  </g>
</svg>
