<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Partie — Pilou</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <!-- PWA : application installable + hors-ligne -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0044cc" />
    <script>
      try {
        var t = localStorage.getItem("pilou-theme");
        if (t) {
          document.documentElement.style.setProperty("--primaire", t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", t);
        }
      } catch (e) {}
    </script>
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pilou" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chrome">
      <header class="app-bar"></header>
      <nav class="tabbar"></nav>
    </div>

    <main>
      <div class="barre-groupe" id="barre-groupe">
        <span>Groupe&nbsp;: <strong id="nom-groupe-actif"></strong></span>
        <select id="select-jeu" class="select-jeu" style="margin-left: auto"></select>
      </div>

      <section class="carte" id="carte-bloquee" style="display: none">
        <p class="vide" id="texte-bloque"></p>
        <a href="index.html" class="btn-secondaire" style="display: inline-block;
          text-decoration: none; margin-top: 0.5rem">→ Aller à Jeux</a>
      </section>

      <div id="zone-partie">
        <section class="carte">
          <div class="entete-section">
            <h2 style="margin: 0">Nouvelle partie</h2>
            <button
              class="btn-discret"
              id="btn-son"
              title="Activer ou couper le son"
            ></button>
          </div>
          <div class="champ">
            <label>Comment jouez-vous&nbsp;?</label>
            <div class="bascule-mode" id="mode-partie">
              <button data-mode="solo" class="actif">👤 Chacun pour soi</button>
              <button data-mode="equipes">👥 Équipes</button>
            </div>
          </div>

          <div class="champ">
            <label>Qui a participé&nbsp;? (au moins 2)</label>
            <div class="joueurs-liste" id="liste-participants"></div>
          </div>

          <div class="champ" id="champ-equipes" style="display: none">
            <div class="entete-section">
              <label style="margin: 0">Composition des équipes</label>
              <button class="btn-discret" id="btn-ajouter-equipe">＋ Équipe</button>
            </div>
            <div id="liste-compo"></div>
          </div>

          <div class="champ">
            <div class="entete-section">
              <label id="label-ordre" style="margin: 0">Ordre d'arrivée</label>
              <button class="btn-discret" id="btn-recommencer" style="display: none">
                ↺ Recommencer
              </button>
            </div>
            <div class="gagnant-options" id="liste-ordre"></div>
          </div>

          <button class="btn-principal" id="btn-enregistrer">
            🏆 Enregistrer la partie
          </button>

          <div id="message"></div>
        </section>

        <section class="carte" id="carte-podium" style="display: none">
          <div class="entete-section">
            <h2>Top du moment</h2>
            <a href="classement.html" class="petit">Voir tout →</a>
          </div>
          <div id="mini-podium"></div>
        </section>
      </div>
    </main>

    <footer>Pilou 🌳 — vos données restent sur cet appareil.</footer>

    <script src="app.js"></script>
    <script src="ui.js"></script>
    <script src="anim.js"></script>
    <script src="onboarding.js"></script>
    <script>
      monterChrome("partie");
      let donnees = chargerDonnees();
      let participantsChoisis = new Set();
      // `ordre` : en solo, ids des joueurs du 1er au dernier ; en équipes,
      // indices des équipes du 1er au dernier.
      let ordre = [];
      let mode = "solo"; // "solo" (chacun pour soi) ou "equipes"
      let nbEquipes = 2;
      let equipeDe = {}; // id joueur -> index d'équipe (0-based), en mode équipes

      const elMessage = document.getElementById("message");
      const elParticipants = document.getElementById("liste-participants");
      const elOrdre = document.getElementById("liste-ordre");
      const elLabelOrdre = document.getElementById("label-ordre");
      const elBtnRecommencer = document.getElementById("btn-recommencer");
      const elCartePodium = document.getElementById("carte-podium");
      const elMiniPodium = document.getElementById("mini-podium");
      const elZonePartie = document.getElementById("zone-partie");
      const elCarteBloquee = document.getElementById("carte-bloquee");
      const elTexteBloque = document.getElementById("texte-bloque");
      const elBarreGroupe = document.getElementById("barre-groupe");
      const elNomGroupe = document.getElementById("nom-groupe-actif");
      const elSelectJeu = document.getElementById("select-jeu");
      const elModePartie = document.getElementById("mode-partie");
      const elChampEquipes = document.getElementById("champ-equipes");
      const elListeCompo = document.getElementById("liste-compo");
      const elBtnAjouterEquipe = document.getElementById("btn-ajouter-equipe");

      const medailles = ["🥇", "🥈", "🥉"];
      const medaille = (i) => medailles[i] || `${i + 1}ᵉ`;

      function afficherMessage(html, type, persistant) {
        elMessage.innerHTML = `<div class="message ${type}">${html}</div>`;
        if (!persistant) {
          setTimeout(() => {
            if (elMessage.querySelector(".message")) elMessage.innerHTML = "";
          }, 4000);
        }
      }

      function rendreParticipants() {
        const g = groupeActif(donnees);
        elParticipants.innerHTML = "";
        g.joueurs.forEach((j) => {
          const choisi = participantsChoisis.has(j.id);
          const label = document.createElement("label");
          label.className = "puce" + (choisi ? " choisi" : "");
          label.innerHTML = `
            <input type="checkbox" ${choisi ? "checked" : ""} />
            ${avatarHTML(j, 22)}<span>${j.nom}</span>`;
          label.querySelector("input").addEventListener("change", (e) => {
            if (e.target.checked) participantsChoisis.add(j.id);
            else {
              participantsChoisis.delete(j.id);
              delete equipeDe[j.id];
            }
            // La composition change : on réinitialise l'ordre.
            if (mode === "equipes") ordre = [];
            else ordre = ordre.filter((id) => participantsChoisis.has(id));
            rendreParticipants();
            rendreCompo();
            rendreOrdre();
          });
          elParticipants.appendChild(label);
        });
      }

      // --- Mode (chacun pour soi / équipes) ---
      elModePartie.querySelectorAll("button").forEach((b) => {
        b.addEventListener("click", () => {
          mode = b.dataset.mode;
          elModePartie
            .querySelectorAll("button")
            .forEach((x) => x.classList.toggle("actif", x === b));
          elChampEquipes.style.display = mode === "equipes" ? "" : "none";
          ordre = [];
          rendreCompo();
          rendreOrdre();
        });
      });

      elBtnAjouterEquipe.addEventListener("click", () => {
        if (nbEquipes < participantsChoisis.size) {
          nbEquipes += 1;
          ordre = [];
          rendreCompo();
          rendreOrdre();
        }
      });

      // Membres (ids) d'une équipe donnée.
      function membresEquipe(t) {
        return [...participantsChoisis].filter((id) => equipeDe[id] === t);
      }
      // Indices des équipes ayant au moins un membre.
      function equipesNonVides() {
        const v = [];
        for (let t = 0; t < nbEquipes; t++)
          if (membresEquipe(t).length) v.push(t);
        return v;
      }

      // --- Composition des équipes (mode équipes) ---
      function rendreCompo() {
        if (mode !== "equipes") return;
        const g = groupeActif(donnees);
        const ids = [...participantsChoisis];

        // Affecte une équipe (la moins remplie) à tout participant sans équipe.
        ids.forEach((id) => {
          if (equipeDe[id] === undefined || equipeDe[id] >= nbEquipes) {
            let best = 0;
            let bestN = Infinity;
            for (let t = 0; t < nbEquipes; t++) {
              const n = membresEquipe(t).length;
              if (n < bestN) {
                bestN = n;
                best = t;
              }
            }
            equipeDe[id] = best;
          }
        });

        elBtnAjouterEquipe.style.display =
          nbEquipes < ids.length ? "" : "none";

        if (ids.length < 2) {
          elListeCompo.innerHTML =
            '<p class="vide">Sélectionne au moins 2 participants.</p>';
          return;
        }

        elListeCompo.innerHTML = "";
        ids.forEach((id) => {
          const j = joueurParId(g, id);
          const ligne = document.createElement("div");
          ligne.className = "compo-ligne";
          let boutons = "";
          for (let t = 0; t < nbEquipes; t++) {
            boutons += `<button class="compo-eq${
              equipeDe[id] === t ? " actif" : ""
            }" data-eq="${t}">${t + 1}</button>`;
          }
          ligne.innerHTML = `<span class="cellule-joueur">${avatarHTML(
            j,
            24
          )} ${j.nom}</span><span class="compo-choix">${boutons}</span>`;
          ligne.querySelectorAll(".compo-eq").forEach((b) => {
            b.addEventListener("click", () => {
              equipeDe[id] = +b.dataset.eq;
              ordre = [];
              rendreCompo();
              rendreOrdre();
            });
          });
          elListeCompo.appendChild(ligne);
        });
      }

      function rendreOrdre() {
        const g = groupeActif(donnees);
        const ids = [...participantsChoisis];

        if (mode === "equipes") {
          rendreOrdreEquipes(g, ids);
          return;
        }

        ordre = ordre.filter((id) => participantsChoisis.has(id));
        elBtnRecommencer.style.display = ordre.length ? "" : "none";

        if (ids.length < 2) {
          elLabelOrdre.textContent = "Ordre d'arrivée";
          elOrdre.innerHTML =
            '<p class="vide">Sélectionne au moins 2 participants.</p>';
          return;
        }

        elLabelOrdre.textContent =
          ids.length === 2
            ? "Qui a gagné ?"
            : "Ordre d'arrivée (clique du 1er au dernier)";

        // Le dernier joueur non classé est déduit automatiquement.
        const nonClasses = ids.filter((id) => !ordre.includes(id));
        const dernierDeduit = nonClasses.length === 1 ? nonClasses[0] : null;

        elOrdre.innerHTML = "";
        ids.forEach((id) => {
          const j = joueurParId(g, id);
          const pos = ordre.indexOf(id);
          const opt = document.createElement("div");

          if (pos >= 0) {
            opt.className = "gagnant-opt choisi";
            opt.innerHTML = `${medaille(pos)} ${avatarHTML(j, 24)} <strong>${j.nom}</strong>`;
          } else if (id === dernierDeduit) {
            opt.className = "gagnant-opt deduit";
            opt.innerHTML = `${medaille(ids.length - 1)} ${avatarHTML(
              j,
              24
            )} ${j.nom} <span class="petit">(dernier)</span>`;
          } else {
            opt.className = "gagnant-opt cliquable";
            opt.innerHTML = `＋ ${avatarHTML(j, 24)} ${j.nom}`;
            opt.addEventListener("click", () => {
              ordre.push(id);
              rendreOrdre();
            });
          }
          elOrdre.appendChild(opt);
        });
      }

      // Ordre d'arrivée des ÉQUIPES (mode équipes). `ordre` contient des indices.
      function rendreOrdreEquipes(g, ids) {
        const eqs = equipesNonVides();
        ordre = ordre.filter((t) => eqs.includes(t));
        elBtnRecommencer.style.display = ordre.length ? "" : "none";

        if (ids.length < 2 || eqs.length < 2) {
          elLabelOrdre.textContent = "Ordre d'arrivée des équipes";
          elOrdre.innerHTML =
            '<p class="vide">Forme au moins 2 équipes (répartis les joueurs ci-dessus).</p>';
          return;
        }

        elLabelOrdre.textContent =
          eqs.length === 2
            ? "Quelle équipe a gagné ?"
            : "Ordre d'arrivée des équipes (clique de la 1re à la dernière)";

        const nonClasses = eqs.filter((t) => !ordre.includes(t));
        const dernierDeduit = nonClasses.length === 1 ? nonClasses[0] : null;

        const avatarsEq = (t) =>
          membresEquipe(t)
            .map((id) => avatarHTML(joueurParId(g, id), 22))
            .join("");
        const nomsEq = (t) =>
          membresEquipe(t)
            .map((id) => joueurParId(g, id).nom)
            .join(" & ");

        elOrdre.innerHTML = "";
        eqs.forEach((t) => {
          const pos = ordre.indexOf(t);
          const opt = document.createElement("div");
          const label = `<strong>Éq.&nbsp;${t + 1}</strong> ${avatarsEq(
            t
          )} <span class="petit">${nomsEq(t)}</span>`;

          if (pos >= 0) {
            opt.className = "gagnant-opt choisi";
            opt.innerHTML = `${medaille(pos)} ${label}`;
          } else if (t === dernierDeduit) {
            opt.className = "gagnant-opt deduit";
            opt.innerHTML = `${medaille(
              eqs.length - 1
            )} ${label} <span class="petit">(dernière)</span>`;
          } else {
            opt.className = "gagnant-opt cliquable";
            opt.innerHTML = `＋ ${label}`;
            opt.addEventListener("click", () => {
              ordre.push(t);
              rendreOrdre();
            });
          }
          elOrdre.appendChild(opt);
        });
      }

      elBtnRecommencer.addEventListener("click", () => {
        ordre = [];
        rendreOrdre();
      });

      function rendreMiniPodium() {
        const g = groupeActif(donnees);
        const nbJeu = g.parties.filter(
          (p) => p.jeuId === donnees.jeuActifId
        ).length;
        const classement = calculerClassement(g, donnees.jeuActifId).slice(0, 3);
        if (nbJeu === 0 || classement.length === 0) {
          elCartePodium.style.display = "none";
          return;
        }
        elCartePodium.style.display = "";
        elMiniPodium.innerHTML = classement
          .map(
            (j, i) => `<div style="display:flex;justify-content:space-between;
              align-items:center;padding:0.4rem 0;border-bottom:1px solid var(--ligne)">
              <span class="cellule-joueur">${medailles[i]} ${avatarHTML(
              j,
              24
            )} ${j.nom}</span>
              <strong style="color:var(--texte)">${j.score}</strong>
            </div>`
          )
          .join("");
      }

      document
        .getElementById("btn-enregistrer")
        .addEventListener("click", () => {
          const g = groupeActif(donnees);
          const ids = [...participantsChoisis];
          if (ids.length < 2) {
            afficherMessage("Il faut au moins 2 participants.", "erreur");
            return;
          }

          // Liste des unités ordonnées (chaque unité = une équipe d'ids ;
          // en solo, une équipe d'une personne).
          let unites;
          if (mode === "equipes") {
            const eqs = equipesNonVides();
            if (eqs.length < 2) {
              afficherMessage("Forme au moins 2 équipes.", "erreur");
              return;
            }
            const manquants = eqs.filter((t) => !ordre.includes(t));
            if (manquants.length > 1) {
              afficherMessage(
                "Termine le classement des équipes (clique-les dans l'ordre d'arrivée).",
                "erreur"
              );
              return;
            }
            unites = [...ordre, ...manquants].map((t) => membresEquipe(t));
          } else {
            const manquants = ids.filter((id) => !ordre.includes(id));
            if (manquants.length > 1) {
              afficherMessage(
                "Termine le classement : clique les joueurs dans l'ordre d'arrivée.",
                "erreur"
              );
              return;
            }
            unites = [...ordre, ...manquants].map((id) => [id]);
          }

          // Classement avant/après — propre au jeu sélectionné — pour les
          // variations ET la gamification.
          const jeuId = donnees.jeuActifId;
          const clAvant = calculerClassement(g, jeuId);
          const avant = {};
          const trophAvant = {};
          clAvant.forEach((e) => {
            avant[e.id] = e.score;
            trophAvant[e.id] = new Set(e.trophees);
          });

          enregistrerPartie(g, unites, jeuId);
          sauvegarder(donnees);

          const clApres = calculerClassement(g, jeuId);
          const apres = {};
          clApres.forEach((e) => (apres[e.id] = e.score));

          const equipeGagnante = unites[0];

          // Animations : confettis + son + toasts (série, trophées débloqués).
          lancerConfettis();
          jouerSonVictoire();
          const annonces = [];
          equipeGagnante.forEach((id) => {
            const e = clApres.find((x) => x.id === id);
            const j = joueurParId(g, id);
            if (e && BONUS_SERIE[e.serie] && j) {
              annonces.push({
                emoji: "🔥",
                titre: `Série de ${e.serie} !`,
                sous: `${j.nom} empoche +${BONUS_SERIE[e.serie]} points bonus`,
              });
            }
          });
          clApres.forEach((e) => {
            e.trophees.forEach((tid) => {
              if (trophAvant[e.id] && trophAvant[e.id].has(tid)) return;
              const t = tropheeParId(tid);
              const j = joueurParId(g, e.id);
              if (t && j)
                annonces.push({
                  emoji: t.emoji,
                  titre: `Trophée : ${t.nom}`,
                  sous: `${j.nom} — ${t.desc}`,
                });
            });
          });
          toastsEnChaine(annonces);

          participantsChoisis = new Set();
          ordre = [];
          equipeDe = {};
          nbEquipes = 2;
          rendreParticipants();
          rendreCompo();
          rendreOrdre();
          rendreMiniPodium();

          // Résultat : l'équipe gagnante et son gain (partagé), puis les autres.
          const refGag = equipeGagnante[0];
          const dGag = apres[refGag] - avant[refGag];
          const soloGagnant = equipeGagnante.length === 1;
          const nomsGag = equipeGagnante
            .map((id) => joueurParId(g, id).nom)
            .join(" & ");
          const avatarsGag = equipeGagnante
            .map((id) => avatarHTML(joueurParId(g, id), 42))
            .join("");
          const autres = unites
            .slice(1)
            .map((unit, i) => {
              const noms = unit.map((id) => joueurParId(g, id).nom).join(" & ");
              const d = apres[unit[0]] - avant[unit[0]];
              return `${medaille(i + 1)} ${noms} <strong>${
                d > 0 ? "+" + d : d
              }</strong>`;
            })
            .join(" · ");

          afficherMessage(
            `<div style="display:flex;justify-content:space-between;align-items:center;gap:0.6rem">
               <div style="display:flex;align-items:center;gap:0.6rem">
                 <span style="display:flex">${avatarsGag}</span>
                 <div>
                   <div>🏆 <strong>${nomsGag}</strong>
                     <span class="delta-badge ${dGag >= 0 ? "pos" : "neg"}">${
              dGag >= 0 ? "+" + dGag : dGag
            }</span></div>
                   ${
                     soloGagnant
                       ? `<div class="score-grand"><span id="score-anime">${avant[refGag]}</span> pts</div>`
                       : `<div class="petit" style="margin-top:0.2rem">chaque coéquipier&nbsp;: <strong>${
                           dGag >= 0 ? "+" + dGag : dGag
                         }</strong> pts</div>`
                   }
                   ${autres ? `<div class="petit" style="margin-top:0.2rem">${autres}</div>` : ""}
                 </div>
               </div>
               <button class="btn-discret" id="btn-annuler">↩️ Annuler</button>
             </div>`,
            "ok",
            true
          );
          if (soloGagnant) {
            const elScoreAnime = document.getElementById("score-anime");
            if (elScoreAnime)
              animerNombre(elScoreAnime, apres[refGag], 950, avant[refGag]);
          }
          document
            .getElementById("btn-annuler")
            .addEventListener("click", () => {
              annulerDernierePartie(g);
              sauvegarder(donnees);
              rendreMiniPodium();
              afficherMessage("Dernière partie annulée. ↩️", "ok");
            });
        });

      function rendreTout() {
        const g = groupeActif(donnees);
        const pret = g && g.joueurs.length >= 2;
        elBarreGroupe.style.display = g ? "" : "none";
        elZonePartie.style.display = pret ? "" : "none";
        elCarteBloquee.style.display = pret ? "none" : "";

        if (g) elNomGroupe.textContent = g.nom;

        if (!g) {
          elTexteBloque.textContent =
            "Aucun groupe pour l'instant. Crée un groupe et ajoute des joueurs dans l'onglet Jeux → Gérer.";
          return;
        }
        if (!pret) {
          elTexteBloque.textContent =
            "Il faut au moins 2 joueurs dans ce groupe pour lancer une partie.";
          return;
        }
        rendreSelectJeu();
        rendreParticipants();
        rendreCompo();
        rendreOrdre();
        rendreMiniPodium();
      }

      // Choix du jeu auquel on joue (catalogue global, partagé avec l'onglet Jeux).
      function rendreSelectJeu() {
        elSelectJeu.innerHTML = donnees.jeux
          .map(
            (j) =>
              `<option value="${j.id}"${
                j.id === donnees.jeuActifId ? " selected" : ""
              }>${j.embleme || "🎮"} ${j.nom}</option>`
          )
          .join("");
      }
      elSelectJeu.addEventListener("change", () => {
        definirJeuActif(donnees, elSelectJeu.value);
        sauvegarder(donnees);
        rendreMiniPodium();
      });

      // Réglage du son (préférence mémorisée).
      const elBtnSon = document.getElementById("btn-son");
      function majSon() {
        elBtnSon.textContent = sonActive() ? "🔊 Son" : "🔇 Muet";
      }
      elBtnSon.addEventListener("click", () => {
        basculerSon();
        majSon();
      });
      majSon();

      rendreTout();

      // Recharge les données si la page revient du cache (bouton Précédent).
      window.addEventListener("pageshow", (e) => {
        if (e.persisted) {
          donnees = chargerDonnees();
          rendreTout();
        }
      });
    </script>
  </body>
</html>
